<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca:wght@400&display=swap"
      rel="stylesheet"
    />

    <title>Bootstrap | Stats preview card component</title>

    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />

    <style>
      body {
        font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: hsl(233, 47%, 7%);
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .card-container {
        max-width: 64rem; 
      }

      .card-stats {
        background-color: hsl(244, 38%, 16%);
        border-radius: 0.75rem;
        overflow: hidden;
      }

      .card-image-wrapper {
        position: relative;
        height: 100%;
      }

      .card-image-wrapper::after {
        content: "";
        position: absolute;
        inset: 0;
        background-color: hsla(277, 64%, 61%, 0.6);
        mix-blend-mode: multiply;
      }

      .card-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .accent {
        color: hsl(277, 64%, 61%);
      }

      .text-muted-custom {
        color: hsla(0, 0%, 100%, 0.75);
      }

      .text-stat-label {
        font-family: "Lexend Deca", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: hsla(0, 0%, 100%, 0.6);
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .card-stats h1 {
        font-size: clamp(1.9rem, 2.6vw, 2.4rem);
        line-height: 1.2;
      }

      @media (max-width: 767.98px) {
        body {
          padding: 2rem 1.25rem;
        }

        .card-stats {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9 card-container">
          <div class="card-stats">
            <div class="row g-0 flex-column-reverse flex-lg-row">
              
              <div class="col-lg-6">
                <div class="p-4 p-md-5">
                  <h1 class="fw-bold mb-3">
                    Get <span class="accent">insights</span> that help your business grow.
                  </h1>
                  <p class="mb-4 text-muted-custom">
                    Discover the benefits of data analytics and make better decisions regarding revenue,
                    customer experience, and overall efficiency.
                  </p>

                  <div class="row gy-3 gy-md-0">
                    <div class="col-12 col-md-4">
                      <div class="fw-bold fs-4">10k+</div>
                      <div class="text-stat-label">companies</div>
                    </div>
                    <div class="col-12 col-md-4">
                      <div class="fw-bold fs-4">314</div>
                      <div class="text-stat-label">templates</div>
                    </div>
                    <div class="col-12 col-md-4">
                      <div class="fw-bold fs-4">12m+</div>
                      <div class="text-stat-label">queries</div>
                    </div>
                  </div>
                </div>
              </div>

              
              <div class="col-lg-6">
                <div class="card-image-wrapper">
                  <picture>
                    <source
                      srcset="./images/image-header-desktop.jpg"
                      media="(min-width: 1024px)"
                    />
                    <img
                      src="./images/image-header-mobile.jpg"
                      alt="People working in an office"
                      class="card-image"
                    />
                  </picture>
                </div>
              </div>
            </div>
          </div>

          <p class="mt-3 mb-0 text-center text-muted-custom small">
            Built with <strong>Bootstrap 5</strong>.
          </p>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
