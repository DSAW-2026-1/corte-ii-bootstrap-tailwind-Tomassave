<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Stats preview card component</title>

    
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: hsl(233, 47%, 7%);
        color: white;
      }

      .wrapper {
        max-width: 480px;
        width: 100%;
        background-color: hsl(244, 38%, 16%);
        border-radius: 0.75rem;
        padding: 2rem 1.75rem 1.5rem;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.75rem;
      }

      p {
        margin: 0 0 1.75rem;
        color: hsla(0, 0%, 100%, 0.75);
        font-size: 0.95rem;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .buttons a {
        display: block;
        padding: 0.75rem 1rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: background-color 0.2s ease, color 0.2s ease, transform 0.1s ease;
      }

      .btn-bootstrap {
        background-color: hsl(277, 64%, 61%);
        color: white;
      }

      .btn-bootstrap:hover {
        background-color: hsl(277, 64%, 55%);
        transform: translateY(-1px);
      }

      .btn-tailwind {
        background-color: transparent;
        color: white;
        border: 1px solid hsla(0, 0%, 100%, 0.4);
      }

      .btn-tailwind:hover {
        background-color: hsla(0, 0%, 100%, 0.08);
        transform: translateY(-1px);
      }

      .note {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: hsla(0, 0%, 100%, 0.6);
      }

      @media (min-width: 600px) {
        .buttons {
          flex-direction: row;
        }

        .buttons a {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrapper">
      <h1>Stats preview card</h1>
      <p>
        Elige que version quieres ver: 
        <strong>Bootstrap</strong> o <strong>Tailwind CSS</strong>.
      </p>
      <div class="buttons">
        <a href="./bootstrap.html" class="btn-bootstrap">Ver versión Bootstrap</a>
        <a href="./tailwind.html" class="btn-tailwind">Ver versión Tailwind</a>
      </div>
      <p class="note">
        Tomás Sarmiento Vela
      </p>
    </main>
  </body>
</html>
